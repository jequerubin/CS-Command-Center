<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TuskCS{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div class="header-left">
            <img src="{{ url_for('static', filename='TuskCS Favicon.png') }}" alt="TuskCS" class="header-logo-img">
            <div class="header-text">
                <span class="header-title">TuskCS</span>
                <span class="header-welcome">Welcome back, {{ session.get('github_username', 'Student') }}!</span>
            </div>
        </div>
        <div class="header-right">
            <a href="{{ url_for('logout') }}" class="logout-link">&#x21AA; Logout</a>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
