<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — TuskCS</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e8eaf6 0%, #fce4ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .login-logo {
            max-width: 260px;
            height: auto;
            margin-bottom: 16px;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .login-desc {
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .error-msg {
            color: #dc2626;
            font-size: 0.875rem;
            margin-bottom: 16px;
        }

        .btn-github {
            display: block;
            width: 100%;
            background: #1a1a2e;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 16px;
        }

        .btn-github:hover {
            background: #2d2d4e;
        }

        .consent-text {
            font-size: 0.75rem;
            color: #9ca3af;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="{{ url_for('static', filename='TuskCS Banner.png') }}" alt="TuskCS" class="login-logo">
        <p class="login-subtitle">Cal State Fullerton Computer Science Student Dashboard</p>
        <p class="login-desc">Access your Canvas assignments, GitHub repositories, and more in one centralized location.</p>

        {% if error %}
        <p class="error-msg">{{ error }}</p>
        {% endif %}

        <a href="{{ url_for('github.login') }}" class="btn-github">Sign in with GitHub</a>

        <p class="consent-text">By signing in, you agree to access your GitHub and Canvas data.</p>
    </div>
</body>
</html>
