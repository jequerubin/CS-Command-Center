<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading — TuskCS</title>
    <style>
        /* DO NOT use style.css - styling inline to keep loading page self-contained */

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e8eaf6 0%, #fce4ec 100%);
            color: #1a1a2e;
            min-height: 100vh;
            overflow: hidden;
        }

        .loading-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
        }

        .skeleton-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            filter: blur(6px);
            opacity: 0.5;
        }

        .skel-header {
            background: #1a1a2e;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 40px;
        }

        .skel-body {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .skel-card {
            background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
            height: 140px;
        }

        .skel-full { width: 100%; }
        .skel-tall { height: 280px; }

        .skel-row {
            display: flex;
            gap: 0;
        }

        .skel-55 { width: 55%; border-radius: 12px 0 0 12px; }
        .skel-45 { width: 45%; border-radius: 0 12px 12px 0; }
        .skel-50 { width: 50%; }
        .skel-row .skel-50:first-child { border-radius: 12px 0 0 12px; }
        .skel-row .skel-50:last-child { border-radius: 0 12px 12px 0; }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Foreground loading message */
        .loading-foreground {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .loading-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 24px;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="skeleton-layer">
            <!-- Skeleton header -->
            <div class="skel-header">
                <img src="/static/TuskCS Favicon.png" alt=""
                     style="width:36px; height:36px; border-radius:8px; opacity:0.5;">
            </div>
            <!-- Skeleton body matching dashboard layout -->
            <div class="skel-body">
                <div class="skel-card skel-full skel-tall"></div>
                <div class="skel-row">
                    <div class="skel-card skel-55"></div>
                    <div class="skel-card skel-45"></div>
                </div>
                <div class="skel-row">
                    <div class="skel-card skel-50"></div>
                    <div class="skel-card skel-50"></div>
                </div>
                <div class="skel-card skel-full"></div>
            </div>
        </div>
        <div class="loading-foreground">
            <p class="loading-text">Fetching your data...</p>
            <div class="loading-spinner"></div>
        </div>
    </div>

    <script>
        fetch('/dashboard', {
            credentials: 'same-origin',
            headers: { 'Accept': 'text/html' }
        })
        .then(response => response.text())
        .then(html => {
            document.open();
            document.write(html);
            document.close();
            // Update the URL in the browser address bar
            window.history.replaceState(null, '', '/dashboard');
        })
        .catch(err => {
            // If fetch fails, redirect normally as fallback
            window.location.href = '/dashboard';
        });
    </script>
</body>
</html>
