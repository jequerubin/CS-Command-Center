<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading — CS Command Center</title>
    <style>
        /* DO NOT use style.css - styling inline to keep loading page self-contained */

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .loading-container {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        /* Skeleton card grid — blurred background */
        .skeleton-background {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 80px 40px 40px;
            filter: blur(4px);
            opacity: 0.5;
        }

        .skeleton-card {
            background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
            height: 180px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Foreground loading message */
        .loading-foreground {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .loading-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 24px;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #4A90D9;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="skeleton-background">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </div>
        <div class="loading-foreground">
            <p class="loading-text">Fetching your data...</p>
            <div class="loading-spinner"></div>
        </div>
    </div>

    <script>
        fetch('/dashboard', {
            credentials: 'same-origin',
            headers: { 'Accept': 'text/html' }
        })
        .then(response => response.text())
        .then(html => {
            document.open();
            document.write(html);
            document.close();
            // Update the URL in the browser address bar
            window.history.replaceState(null, '', '/dashboard');
        })
        .catch(err => {
            // If fetch fails, redirect normally as fallback
            window.location.href = '/dashboard';
        });
    </script>
</body>
</html>
